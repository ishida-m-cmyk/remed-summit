<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>えいけん じゅんにきゅう 22にちチャレンジ</title>
<style>
  :root{
    --bg:#fff8e7;
    --card:#ffffff;
    --primary:#ff7aa2;
    --primary-d:#e85a85;
    --accent:#5ec8ff;
    --accent-d:#3aa8e0;
    --good:#7ed957;
    --bad:#ff7676;
    --ink:#3a2b4a;
    --sub:#7c6f8a;
    --gold:#ffcf45;
    --shadow:0 6px 0 rgba(58,43,74,.12), 0 10px 22px rgba(58,43,74,.08);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family: "Hiragino Maru Gothic ProN","ヒラギノ丸ゴ ProN W4","Yu Gothic","メイリオ",system-ui,-apple-system,sans-serif;
    -webkit-tap-highlight-color:transparent;
    overflow-x:hidden;
  }
  body{min-height:100vh;background-image:
    radial-gradient(circle at 10% 10%, #ffe9b3 0 14px, transparent 15px),
    radial-gradient(circle at 85% 20%, #cfeaff 0 12px, transparent 13px),
    radial-gradient(circle at 20% 80%, #ffd1e0 0 10px, transparent 11px),
    radial-gradient(circle at 75% 85%, #d8f3c8 0 14px, transparent 15px);
    background-attachment: fixed;
  }
  header{
    padding:18px 16px 6px; text-align:center;
  }
  h1{
    margin:0; font-size:22px; letter-spacing:.02em;
    background: linear-gradient(180deg,#ff7aa2,#e85a85);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow: 0 2px 0 rgba(255,255,255,.6);
  }
  .sub{color:var(--sub); font-size:12px; margin-top:4px}
  main{max-width:760px; margin:0 auto; padding:8px 14px 100px}
  .card{
    background:var(--card); border-radius:22px; padding:18px;
    box-shadow:var(--shadow); border:3px solid #fff;
  }
  .row{display:flex; gap:10px; flex-wrap:wrap}
  .center{display:flex; align-items:center; justify-content:center}
  .stat{
    flex:1 1 0; min-width:90px;
    background:#fff; border-radius:16px; padding:10px 12px;
    box-shadow:var(--shadow); border:3px solid #fff; text-align:center;
  }
  .stat .n{font-size:22px; font-weight:800; color:var(--primary-d)}
  .stat .l{font-size:11px; color:var(--sub); margin-top:2px}
  .days{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(72px,1fr));
    gap:10px; margin-top:14px;
  }
  .day{
    aspect-ratio:1/1; border-radius:18px; background:#fff; border:3px solid #fff;
    box-shadow:var(--shadow); display:flex; flex-direction:column;
    align-items:center; justify-content:center; cursor:pointer;
    transition:transform .12s ease;
    position:relative; overflow:hidden;
  }
  .day:active{transform:translateY(2px)}
  .day .n{font-size:13px; color:var(--sub)}
  .day .d{font-size:24px; font-weight:900; color:var(--ink)}
  .day .pct{font-size:10px; color:var(--sub); margin-top:2px}
  .day.done{background:linear-gradient(180deg,#fff7c2,#ffd86b); border-color:#fff}
  .day.done .d{color:#7a4b00}
  .day.today{outline:3px dashed var(--primary); outline-offset:-2px}
  .day .star{position:absolute; top:4px; right:6px; font-size:14px}
  .badge{
    display:inline-block; padding:2px 8px; border-radius:999px;
    background:var(--primary); color:#fff; font-size:11px; font-weight:700;
    margin-left:6px;
  }
  .btn{
    appearance:none; border:none; cursor:pointer; user-select:none;
    border-radius:999px; padding:14px 20px; font-weight:800; font-size:16px;
    color:#fff; background:var(--primary);
    box-shadow:0 4px 0 var(--primary-d), 0 8px 18px rgba(232,90,133,.25);
    transition:transform .08s ease, box-shadow .08s ease;
  }
  .btn:active{transform:translateY(3px); box-shadow:0 1px 0 var(--primary-d)}
  .btn.secondary{background:var(--accent); box-shadow:0 4px 0 var(--accent-d), 0 8px 18px rgba(58,168,224,.25)}
  .btn.secondary:active{box-shadow:0 1px 0 var(--accent-d)}
  .btn.ghost{background:#fff; color:var(--ink); box-shadow:0 4px 0 #d9d2e3, 0 8px 18px rgba(58,43,74,.08)}
  .btn.ghost:active{box-shadow:0 1px 0 #d9d2e3}
  .btn.small{padding:8px 14px; font-size:13px}
  .btn.full{display:block; width:100%}
  .btn.gold{background:linear-gradient(180deg,#ffe27a,#ffcf45); color:#7a4b00; box-shadow:0 4px 0 #c8961b, 0 8px 18px rgba(200,150,27,.25)}
  .btn.gold:active{box-shadow:0 1px 0 #c8961b}

  .toolbar{display:flex; justify-content:space-between; align-items:center; gap:8px; margin-bottom:10px}
  .pill{background:#fff; border-radius:999px; padding:6px 12px; font-size:12px; box-shadow:var(--shadow); border:2px solid #fff}

  /* Flashcard */
  .flash-wrap{perspective:1200px; margin:10px 0}
  .flash{
    position:relative; height:300px; transform-style:preserve-3d;
    transition:transform .55s cubic-bezier(.2,.8,.3,1.2);
    cursor:pointer;
  }
  .flash.flip{transform:rotateY(180deg)}
  .face{
    position:absolute; inset:0; backface-visibility:hidden;
    border-radius:24px; padding:18px; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center;
    background:#fff; box-shadow:var(--shadow); border:3px solid #fff;
  }
  .face.back{transform:rotateY(180deg);
    background:linear-gradient(180deg,#fff5fb,#ffe1ee);}
  .word{font-size:42px; font-weight:900; letter-spacing:.01em; color:var(--ink)}
  .pos{font-size:13px; color:var(--sub); margin-top:6px}
  .ipa{font-size:14px; color:var(--sub); margin-top:2px}
  .mean{font-size:26px; font-weight:800; color:var(--primary-d)}
  .ex{font-size:13px; color:var(--ink); margin-top:12px; line-height:1.6;
    background:#fffde9; padding:10px 12px; border-radius:14px; border:2px dashed #ffd86b}
  .hint{font-size:11px; color:var(--sub); margin-top:10px}

  /* Quiz */
  .qbox{padding:18px; border-radius:24px; background:#fff; box-shadow:var(--shadow); border:3px solid #fff}
  .q-en{font-size:36px; font-weight:900; text-align:center; margin:6px 0 4px}
  .q-sub{font-size:12px; color:var(--sub); text-align:center; margin-bottom:14px}
  .choices{display:grid; gap:10px; grid-template-columns:1fr 1fr}
  .choice{
    background:#fff; border:3px solid #f0e7f5; border-radius:18px;
    padding:14px 10px; font-size:18px; font-weight:800; color:var(--ink);
    cursor:pointer; box-shadow:0 3px 0 #e7dff0;
    transition:transform .08s ease, background .15s, border-color .15s;
    min-height:64px;
  }
  .choice rt{font-weight:500}
  .choice:active{transform:translateY(2px); box-shadow:0 1px 0 #e7dff0}
  .choice.correct{background:#e7ffe0; border-color:var(--good); color:#256d12}
  .choice.wrong{background:#ffe5e5; border-color:var(--bad); color:#9d2c2c}
  .progress{height:14px; border-radius:999px; background:#f0e7f5; overflow:hidden; margin-top:8px}
  .progress > div{height:100%; background:linear-gradient(90deg,#ff9ec0,#ff7aa2); width:0%; transition:width .3s}

  /* Result */
  .result{text-align:center; padding:18px}
  .big{font-size:64px; font-weight:900; color:var(--primary-d)}
  .stars{font-size:36px; color:var(--gold)}

  /* Daily list */
  .wlist{display:grid; gap:8px; margin-top:10px}
  .wrow{
    display:grid; grid-template-columns: 1fr auto auto; align-items:center; gap:8px;
    background:#fff; border-radius:14px; padding:10px 12px;
    box-shadow:var(--shadow); border:2px solid #fff;
  }
  .wrow .en{font-weight:800; font-size:18px}
  .wrow .ja{font-size:13px; color:var(--sub)}
  .speak{
    width:38px; height:38px; border-radius:50%; border:none; cursor:pointer;
    background:var(--accent); color:#fff; font-size:18px;
    box-shadow:0 3px 0 var(--accent-d);
  }
  .speak:active{transform:translateY(2px); box-shadow:0 1px 0 var(--accent-d)}
  .check{
    width:30px; height:30px; border-radius:50%; border:3px solid #ddd;
    background:#fff; cursor:pointer; font-size:16px; display:flex;
    align-items:center; justify-content:center;
  }
  .check.on{background:var(--good); border-color:var(--good); color:#fff}

  .nav{display:flex; gap:10px; margin-top:14px}
  .nav .btn{flex:1}

  /* Modal */
  .modal{
    position:fixed; inset:0; background:rgba(58,43,74,.4);
    display:none; align-items:center; justify-content:center; padding:20px; z-index:50;
  }
  .modal.show{display:flex}
  .sheet{background:#fff; border-radius:22px; padding:20px; max-width:420px; width:100%;
    box-shadow:var(--shadow); border:3px solid #fff; text-align:center}

  /* Confetti & feedback */
  .feedback{
    position:fixed; inset:0; pointer-events:none; display:none;
    align-items:center; justify-content:center; z-index:40;
  }
  .feedback.show{display:flex}
  .feedback .emoji{font-size:120px; animation:pop .6s ease}
  @keyframes pop{
    0%{transform:scale(.4); opacity:0}
    50%{transform:scale(1.2); opacity:1}
    100%{transform:scale(1); opacity:1}
  }

  ruby rt{font-size:.55em; color:var(--sub); font-weight:400}

  footer{position:fixed; left:0; right:0; bottom:0; padding:8px;
    background:linear-gradient(180deg, transparent, rgba(255,248,231,.95)); pointer-events:none;
    text-align:center; color:var(--sub); font-size:11px;
  }

  @media (min-width:520px){
    .word{font-size:54px}
    .q-en{font-size:46px}
    .choices{grid-template-columns:1fr 1fr}
  }
</style>
</head>
<body>
<header>
  <h1>えいけん じゅん2きゅう 22にちチャレンジ</h1>
  <div class="sub">しけんまで <span id="daysLeft">22</span> にち / きょうのもくひょう <span id="todayGoal">1</span> にちめ</div>
</header>

<main id="app">
  <!-- views are rendered here -->
</main>

<div class="modal" id="modal">
  <div class="sheet" id="sheet"></div>
</div>
<div class="feedback" id="feedback"><div class="emoji" id="fbEmoji">🎉</div></div>

<footer>たんごをタップ＝おんせい / カードをタップ＝うらがえし</footer>

const TOTAL_DAYS = CURRICULUM.length;
const STORAGE_KEY = "eiken_pre2_kid_v1";

/* Storage */
function load(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }catch(e){ return {}; }
}
function save(s){ localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }
let state = load();
state.start = state.start || new Date().toISOString().slice(0,10);
state.days = state.days || {};       // dayIdx -> {learned:[idx], quizBest:0..10}
state.streak = state.streak || 0;
state.lastDay = state.lastDay || null;
state.points = state.points || 0;
save(state);

function todayIdx(){
  const start = new Date(state.start);
  const today = new Date();
  const diff = Math.floor((today - start) / 86400000);
  return Math.max(0, Math.min(TOTAL_DAYS-1, diff));
}

/* Speech */
function speak(text){
  if(!('speechSynthesis' in window)) return;
  try{
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "en-US"; u.rate = 0.9; u.pitch = 1.05;
    speechSynthesis.speak(u);
  }catch(e){}
}

/* Feedback */
function feedback(emoji, ms=700){
  const el = document.getElementById('feedback');
  document.getElementById('fbEmoji').textContent = emoji;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), ms);
}

/* Modal */
function openModal(html){
  document.getElementById('sheet').innerHTML = html;
  document.getElementById('modal').classList.add('show');
}
function closeModal(){ document.getElementById('modal').classList.remove('show'); }
document.getElementById('modal').addEventListener('click', (e)=>{
  if(e.target.id==='modal') closeModal();
});

/* Header info */
function refreshHeader(){
  const start = new Date(state.start);
  const exam = new Date(start); exam.setDate(exam.getDate() + TOTAL_DAYS);
  const today = new Date();
  const left = Math.max(0, Math.ceil((exam - today)/86400000));
  document.getElementById('daysLeft').textContent = left;
  document.getElementById('todayGoal').textContent = todayIdx()+1;
}

/* ----- Views ----- */
const app = document.getElementById('app');

function viewHome(){
  refreshHeader();
  const total = TOTAL_DAYS*10;
  let learned = 0;
  for(const k in state.days){ learned += (state.days[k].learned||[]).length; }
  const t = todayIdx();

  let daysHTML = "";
  for(let i=0;i<TOTAL_DAYS;i++){
    const d = state.days[i] || {};
    const ln = (d.learned||[]).length;
    const pct = Math.round(ln/10*100);
    const star = (d.quizBest||0) >= 8 ? "⭐" : (ln>=10? "✅" : (ln>0?"✏️":""));
    const cls = ["day"];
    if(ln>=10 && (d.quizBest||0)>=8) cls.push("done");
    if(i===t) cls.push("today");
    daysHTML += `<div class="${cls.join(' ')}" data-day="${i}">
      <div class="star">${star}</div>
      <div class="n">Day</div>
      <div class="d">${i+1}</div>
      <div class="pct">${pct}%</div>
    </div>`;
  }

  app.innerHTML = `
    <div class="row" style="margin-bottom:10px">
      <div class="stat"><div class="n">${learned}/${total}</div><div class="l">おぼえたたんご</div></div>
      <div class="stat"><div class="n">${state.streak}🔥</div><div class="l">れんぞくにっすう</div></div>
      <div class="stat"><div class="n">${state.points}✨</div><div class="l">ポイント</div></div>
    </div>
    <div class="card">
      <div style="display:flex; align-items:center; justify-content:space-between">
        <div style="font-weight:800">🌸 きょうのチャレンジ</div>
        <span class="pill">Day ${t+1} / 22</span>
      </div>
      <div style="margin-top:10px; color:var(--sub); font-size:13px">
        まずは「フラッシュカード」でたんごをおぼえて、つぎに「クイズ」でちょうせんしてみよう！
      </div>
      <div class="nav">
        <button class="btn" onclick="viewDay(${t})">きょうのDayをはじめる ▶</button>
      </div>
    </div>
    <div style="margin-top:14px; font-weight:800; padding-left:6px">22にちカレンダー</div>
    <div class="days">${daysHTML}</div>
    <div class="row" style="margin-top:16px">
      <button class="btn ghost full" onclick="viewMixedQuiz()">💪 これまで全部から ミックスクイズ</button>
    </div>
    <div class="row" style="margin-top:8px">
      <button class="btn ghost small" onclick="resetAll()">🔄 きろくをリセット</button>
    </div>
  `;
  document.querySelectorAll('.day').forEach(el=>{
    el.addEventListener('click', ()=> viewDay(parseInt(el.dataset.day)));
  });
}

function viewDay(idx){
  const day = CURRICULUM[idx];
  const dstate = state.days[idx] || (state.days[idx]={learned:[], quizBest:0});
  let html = `
    <div class="toolbar">
      <button class="btn ghost small" onclick="viewHome()">← もどる</button>
      <div class="pill">Day ${idx+1}・${day.length}たんご</div>
      <button class="btn small" onclick="viewFlash(${idx},0)">🃏 カード</button>
    </div>
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center">
        <div style="font-weight:800">📖 きょうのたんご</div>
        <div class="pill">${(dstate.learned||[]).length}/${day.length}</div>
      </div>
      <div class="wlist">
  `;
  day.forEach((w,i)=>{
    const checked = (dstate.learned||[]).includes(i);
    html += `
      <div class="wrow">
        <div>
          <div class="en">${w.en} <span style="font-size:11px;color:var(--sub)">${w.pos}</span></div>
          <div class="ja">${w.ja}</div>
        </div>
        <button class="speak" onclick="speak('${w.en.replace(/'/g,"\\'")}')">🔊</button>
        <button class="check ${checked?'on':''}" data-i="${i}" data-d="${idx}">${checked?'✓':''}</button>
      </div>
    `;
  });
  html += `</div></div>
    <div class="nav">
      <button class="btn secondary" onclick="viewFlash(${idx},0)">🃏 フラッシュカード</button>
      <button class="btn" onclick="viewQuiz(${idx})">📝 クイズ ${dstate.quizBest? '🏆 ベスト'+dstate.quizBest+'/10':''}</button>
    </div>
  `;
  app.innerHTML = html;
  document.querySelectorAll('.check').forEach(el=>{
    el.addEventListener('click', ()=>{
      const i = parseInt(el.dataset.i);
      const d = parseInt(el.dataset.d);
      const ds = state.days[d];
      ds.learned = ds.learned || [];
      const k = ds.learned.indexOf(i);
      if(k===-1){ ds.learned.push(i); state.points+=1; el.classList.add('on'); el.textContent='✓'; }
      else { ds.learned.splice(k,1); el.classList.remove('on'); el.textContent=''; }
      save(state);
    });
  });
}

/* Flashcard */
function viewFlash(dayIdx, i){
  const day = CURRICULUM[dayIdx];
  if(i>=day.length){
    feedback("🎊", 900);
    setTimeout(()=>viewDayResult(dayIdx, "カードコンプリート！"),700);
    return;
  }
  const w = day[i];
  app.innerHTML = `
    <div class="toolbar">
      <button class="btn ghost small" onclick="viewDay(${dayIdx})">← もどる</button>
      <div class="pill">Day ${dayIdx+1}・${i+1}/${day.length}</div>
      <button class="btn small secondary" onclick="speak('${w.en.replace(/'/g,"\\'")}')">🔊</button>
    </div>
    <div class="progress"><div style="width:${(i/day.length)*100}%"></div></div>
    <div class="flash-wrap">
      <div class="flash" id="flash">
        <div class="face front">
          <div class="word">${w.en}</div>
          <div class="pos">${w.pos} ${w.ipa||""}</div>
          <div class="hint">タップでこたえをみる</div>
        </div>
        <div class="face back">
          <div class="mean">${w.ja}</div>
          <div class="ex">${w.ex_en}<br/><span style="color:var(--sub)">${w.ex_ja}</span></div>
        </div>
      </div>
    </div>
    <div class="nav">
      <button class="btn ghost" onclick="flashAnswer(${dayIdx},${i},false)">😵 まだまだ</button>
      <button class="btn gold" onclick="flashAnswer(${dayIdx},${i},true)">😄 おぼえた！</button>
    </div>
  `;
  const fl = document.getElementById('flash');
  fl.addEventListener('click', ()=> fl.classList.toggle('flip'));
  speak(w.en);
}
function flashAnswer(dayIdx, i, learned){
  const ds = state.days[dayIdx] || (state.days[dayIdx]={learned:[],quizBest:0});
  ds.learned = ds.learned || [];
  if(learned && !ds.learned.includes(i)){ ds.learned.push(i); state.points+=2; }
  save(state);
  feedback(learned?"⭐":"💪", 500);
  setTimeout(()=>viewFlash(dayIdx, i+1), 350);
}

/* Quiz */
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function buildQuestions(words, allWords){
  // 10 questions, alternating E->J and J->E
  const qs = shuffle([...words]).slice(0,10).map((w,i)=>{
    const wrong = shuffle(allWords.filter(x=>x.en!==w.en)).slice(0,3);
    const dirEJ = i%2===0;
    if(dirEJ){
      const opts = shuffle([w, ...wrong]);
      return {prompt:w.en, sub:w.pos+" "+(w.ipa||""), options:opts.map(o=>o.ja), answer:opts.findIndex(o=>o.en===w.en), speak:w.en};
    }else{
      const opts = shuffle([w, ...wrong]);
      return {prompt:w.ja, sub:"日本語→英語", options:opts.map(o=>o.en), answer:opts.findIndex(o=>o.en===w.en), speak:null};
    }
  });
  return qs;
}

function viewQuiz(dayIdx){
  const allWords = CURRICULUM.flat();
  const qs = buildQuestions(CURRICULUM[dayIdx], allWords);
  runQuiz(qs, (score)=>{
    const ds = state.days[dayIdx] || (state.days[dayIdx]={learned:[],quizBest:0});
    ds.quizBest = Math.max(ds.quizBest||0, score);
    state.points += score;
    // streak
    const today = new Date().toISOString().slice(0,10);
    if(state.lastDay !== today){
      const y = new Date(); y.setDate(y.getDate()-1);
      state.streak = (state.lastDay === y.toISOString().slice(0,10)) ? (state.streak+1) : 1;
      state.lastDay = today;
    }
    save(state);
    showResult(dayIdx, score, qs.length);
  });
}

function viewMixedQuiz(){
  const t = todayIdx();
  const learned = [];
  for(let i=0;i<=t;i++){ learned.push(...CURRICULUM[i]); }
  if(learned.length<4){ openModal(`<h3>まだたんごがすくないよ</h3><p>Day1からはじめよう！</p><button class='btn' onclick='closeModal()'>OK</button>`); return; }
  const qs = buildQuestions(learned, CURRICULUM.flat());
  runQuiz(qs, (score)=>{
    state.points += score;
    save(state);
    showResult(-1, score, qs.length);
  });
}

function runQuiz(qs, onDone){
  let i=0, score=0;
  const render = ()=>{
    if(i>=qs.length){ onDone(score); return; }
    const q = qs[i];
    app.innerHTML = `
      <div class="toolbar">
        <button class="btn ghost small" onclick="viewHome()">← やめる</button>
        <div class="pill">${i+1}/${qs.length}・${score}せいかい</div>
        ${q.speak?`<button class="btn small secondary" onclick="speak('${q.speak.replace(/'/g,"\\'")}')">🔊</button>`:'<div></div>'}
      </div>
      <div class="progress"><div style="width:${(i/qs.length)*100}%"></div></div>
      <div class="qbox">
        <div class="q-en">${q.prompt}</div>
        <div class="q-sub">${q.sub}</div>
        <div class="choices">
          ${q.options.map((o,k)=>`<div class="choice" data-k="${k}">${o}</div>`).join('')}
        </div>
      </div>
    `;
    if(q.speak) speak(q.speak);
    document.querySelectorAll('.choice').forEach(el=>{
      el.addEventListener('click', ()=>{
        const k = parseInt(el.dataset.k);
        if(k===q.answer){
          el.classList.add('correct'); score++; feedback("⭕",450);
        }else{
          el.classList.add('wrong');
          document.querySelectorAll('.choice')[q.answer].classList.add('correct');
          feedback("❌",550);
        }
        document.querySelectorAll('.choice').forEach(c=>c.style.pointerEvents='none');
        setTimeout(()=>{ i++; render(); }, 750);
      });
    });
  };
  render();
}

function showResult(dayIdx, score, total){
  const stars = score>=9? "⭐⭐⭐" : score>=7? "⭐⭐" : score>=4? "⭐" : "💪";
  const msg = score>=9? "かんぺき！" : score>=7? "じょうずだね！" : score>=4? "もうちょっと！" : "もう一どチャレンジ！";
  feedback(score>=7?"🎉":"💪", 800);
  app.innerHTML = `
    <div class="card result">
      <div class="stars">${stars}</div>
      <div style="font-weight:800; font-size:18px; margin-top:6px">${msg}</div>
      <div class="big">${score}<span style="font-size:24px;color:var(--sub)">/${total}</span></div>
      <div style="color:var(--sub); margin-bottom:14px">+${score} ポイント ✨</div>
      <div class="row" style="justify-content:center">
        ${dayIdx>=0?`<button class="btn secondary" onclick="viewQuiz(${dayIdx})">🔁 もういちど</button>`:''}
        <button class="btn" onclick="viewHome()">🏠 ホームへ</button>
      </div>
    </div>
  `;
}

function viewDayResult(dayIdx, message){
  app.innerHTML = `
    <div class="card result">
      <div class="big">🎊</div>
      <div style="font-weight:800; font-size:18px">${message}</div>
      <div style="margin-top:14px" class="row" style="justify-content:center">
        <button class="btn secondary" onclick="viewQuiz(${dayIdx})">📝 クイズへ</button>
        <button class="btn" onclick="viewHome()">🏠 ホーム</button>
      </div>
    </div>
  `;
}

function resetAll(){
  openModal(`
    <h3>🔄 きろくをぜんぶけしますか？</h3>
    <p style="color:var(--sub); font-size:13px">おぼえたチェック・ポイント・れんぞくにっすうがゼロにもどります。</p>
    <div class="row" style="justify-content:center; margin-top:10px">
      <button class="btn ghost" onclick="closeModal()">やめる</button>
      <button class="btn" onclick="doReset()">けす</button>
    </div>
  `);
}
function doReset(){
  localStorage.removeItem(STORAGE_KEY);
  state = load();
  state.start = new Date().toISOString().slice(0,10);
  state.days = {}; state.streak=0; state.lastDay=null; state.points=0;
  save(state);
  closeModal();
  viewHome();
}

/* Init */
viewHome();
</script>
